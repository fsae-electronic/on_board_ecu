
# XDS110 + TMS570LS1224 OpenOCD target configuration
source [find xds110.cfg]

# TMS570LS1224 uses the TI TMS570 family TAP IDs.
set DAP_TAPID 0x0B95502F
set JRC_TAPID 0x0B95502F

# Load the built-in TI family target config.
source [find target/ti_tms570.cfg]

# Keep reset handling conservative for the evaluation board.
reset_config trst_and_srst separate trst_open_drain srst_open_drain